name: Deploy Demo

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment name"
        required: true
        default: "demo"
        type: string
      resource_group_name:
        description: "Azure resource group name"
        required: true
        default: "rg-twp-demo"
        type: string
      container_registry_name:
        description: "Azure Container Registry name"
        required: true
        default: "twpacr4316"
        type: string
      container_app_name:
        description: "Backend Container App name"
        required: true
        default: "twp-backend"
        type: string
      backend_image_name:
        description: "Backend image repository name"
        required: true
        default: "twp-backend"
        type: string
      frontend_storage_account_name:
        description: "Frontend Storage account name"
        required: true
        default: "twpfe5ce0"
        type: string
      frontend_origin:
        description: "Public frontend origin used for backend CORS"
        required: true
        default: "https://twpfe5ce0.z23.web.core.windows.net"
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: hashicorp/setup-terraform@v3

      - name: Backend lint and tests
        working-directory: backend
        run: |
          pip install -r requirements-dev.txt
          ruff check .
          pytest -q

      - name: Frontend build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Backend container build
        run: docker build -t local/trip-weather-planner-backend:${{ github.sha }} ./backend

      - name: Terraform format and validate
        working-directory: infra/terraform/environments/dev
        env:
          TF_VAR_cwa_api_key: validation-placeholder
        run: |
          terraform fmt -check -recursive ../..
          terraform init -backend=false
          terraform validate

  backend:
    runs-on: ubuntu-latest
    needs: verify
    environment: ${{ inputs.environment }}
    env:
      RESOURCE_GROUP_NAME: ${{ inputs.resource_group_name }}
      CONTAINER_REGISTRY_NAME: ${{ inputs.container_registry_name }}
      CONTAINER_APP_NAME: ${{ inputs.container_app_name }}
      BACKEND_IMAGE_NAME: ${{ inputs.backend_image_name }}
      FRONTEND_ORIGIN: ${{ inputs.frontend_origin }}
    outputs:
      backend_url: ${{ steps.backend-url.outputs.backend_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build backend image in ACR
        run: |
          az acr build \
            --registry "$CONTAINER_REGISTRY_NAME" \
            --image "$BACKEND_IMAGE_NAME:${{ github.sha }}" \
            --image "$BACKEND_IMAGE_NAME:latest" \
            ./backend

      - name: Update backend Container App
        run: |
          login_server="$(az acr show \
            --name "$CONTAINER_REGISTRY_NAME" \
            --query loginServer \
            --output tsv)"

          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP_NAME" \
            --image "$login_server/$BACKEND_IMAGE_NAME:${{ github.sha }}" \
            --set-env-vars \
              CACHE_TTL_SECONDS=1800 \
              CORS_ORIGINS="$FRONTEND_ORIGIN" \
              UPSTREAM_TIMEOUT_SECONDS=10 \
              CWA_API_KEY=secretref:cwa-api-key

      - name: Capture backend URL
        id: backend-url
        run: |
          fqdn="$(az containerapp show \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP_NAME" \
            --query properties.configuration.ingress.fqdn \
            --output tsv)"
          echo "backend_url=https://$fqdn" >> "$GITHUB_OUTPUT"

  frontend:
    runs-on: ubuntu-latest
    needs: backend
    environment: ${{ inputs.environment }}
    env:
      FRONTEND_STORAGE_ACCOUNT_NAME: ${{ inputs.frontend_storage_account_name }}
      VITE_API_BASE: ${{ needs.backend.outputs.backend_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build frontend against deployed backend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Upload frontend assets
        working-directory: frontend
        run: |
          az storage blob upload-batch \
            --account-name "$FRONTEND_STORAGE_ACCOUNT_NAME" \
            --destination '$web' \
            --source dist \
            --overwrite true
