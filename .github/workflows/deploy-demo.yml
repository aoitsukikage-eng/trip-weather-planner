name: Deploy Demo

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment name"
        required: true
        default: "demo"
        type: string
      dry_run:
        description: "Validate and build only; skip cloud changes"
        required: true
        default: true
        type: boolean
      region:
        description: "GCP region for Cloud Run and Artifact Registry"
        required: true
        default: "asia-east1"
        type: string
      backend_image:
        description: "Full Artifact Registry image URL to build and deploy"
        required: true
        default: "asia-east1-docker.pkg.dev/your-gcp-project-id/trip-weather-planner/backend:demo"
        type: string
      backend_service_name:
        description: "Cloud Run service name"
        required: true
        default: "twp-api-demo"
        type: string
      frontend_bucket_name:
        description: "Target GCS bucket for frontend static files"
        required: true
        default: "your-unique-frontend-bucket-name"
        type: string
      frontend_origin:
        description: "Public frontend origin allowed by backend CORS"
        required: true
        default: "https://demo.example.com"
        type: string
      cwa_secret_name:
        description: "Secret Manager secret name containing CWA_API_KEY"
        required: true
        default: "cwa-api-key"
        type: string
      gemini_secret_name:
        description: "Optional Secret Manager secret name containing GEMINI_API_KEY"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      can_auth: ${{ steps.check.outputs.can_auth }}
    steps:
      - id: check
        env:
          WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          if [ -n "$WIF_PROVIDER" ] && [ -n "$SERVICE_ACCOUNT" ] && [ -n "$PROJECT_ID" ]; then
            echo "can_auth=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_auth=false" >> "$GITHUB_OUTPUT"
            echo "Missing OIDC deploy secrets. Workflow will stop after dry-run validation."
          fi

  verify:
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: hashicorp/setup-terraform@v3

      - name: Backend lint and tests
        working-directory: backend
        run: |
          pip install -r requirements-dev.txt
          ruff check .
          pytest -q

      - name: Frontend build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Backend container build
        run: docker build -t local/trip-weather-planner-backend:${{ github.sha }} ./backend

      - name: Terraform format and validate
        working-directory: infra/terraform/environments/dev
        run: |
          terraform fmt -check -recursive ../..
          terraform init -backend=false
          terraform validate

  deploy:
    runs-on: ubuntu-latest
    needs: [preflight, verify]
    if: ${{ !inputs.dry_run && needs.preflight.outputs.can_auth == 'true' }}
    environment: ${{ inputs.environment }}
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: ${{ inputs.region }}
      BACKEND_IMAGE: ${{ inputs.backend_image }}
      BACKEND_SERVICE_NAME: ${{ inputs.backend_service_name }}
      FRONTEND_BUCKET_NAME: ${{ inputs.frontend_bucket_name }}
      FRONTEND_ORIGIN: ${{ inputs.frontend_origin }}
      CWA_SECRET_NAME: ${{ inputs.cwa_secret_name }}
      GEMINI_SECRET_NAME: ${{ inputs.gemini_secret_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: hashicorp/setup-terraform@v3

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Build and push backend image
        run: |
          gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet
          docker build -t "${BACKEND_IMAGE}" ./backend
          docker push "${BACKEND_IMAGE}"

      - name: Prepare Terraform variables
        working-directory: infra/terraform/environments/dev
        run: |
          cat > terraform.tfvars <<EOF
          project_id           = "${PROJECT_ID}"
          region               = "${REGION}"
          backend_service_name = "${BACKEND_SERVICE_NAME}"
          backend_image        = "${BACKEND_IMAGE}"
          frontend_bucket_name = "${FRONTEND_BUCKET_NAME}"
          frontend_origin      = "${FRONTEND_ORIGIN}"
          backend_secret_env = {
            CWA_API_KEY = {
              secret  = "${CWA_SECRET_NAME}"
              version = "latest"
            }
          EOF

          if [ -n "${GEMINI_SECRET_NAME}" ]; then
            cat >> terraform.tfvars <<EOF
            GEMINI_API_KEY = {
              secret  = "${GEMINI_SECRET_NAME}"
              version = "latest"
            }
            EOF
          fi

          echo "}" >> terraform.tfvars

      - name: Terraform apply
        working-directory: infra/terraform/environments/dev
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Capture backend URL
        id: outputs
        working-directory: infra/terraform/environments/dev
        run: echo "backend_url=$(terraform output -raw backend_url)" >> "$GITHUB_OUTPUT"

      - name: Frontend build against deployed backend
        working-directory: frontend
        run: |
          npm ci
          VITE_API_BASE="${{ steps.outputs.backend_url }}" npm run build

      - name: Upload frontend assets to GCS
        working-directory: frontend
        run: |
          gcloud storage rsync dist "gs://${FRONTEND_BUCKET_NAME}" \
            --recursive \
            --delete-unmatched-destination-objects

  skipped-deploy-note:
    runs-on: ubuntu-latest
    needs: [preflight, verify]
    if: ${{ inputs.dry_run || needs.preflight.outputs.can_auth != 'true' }}
    steps:
      - run: |
          echo "Dry run complete. No cloud resources were created or modified."
          if [ "${{ needs.preflight.outputs.can_auth }}" != "true" ]; then
            echo "To enable real deployment, configure GCP_WORKLOAD_IDENTITY_PROVIDER,"
            echo "GCP_SERVICE_ACCOUNT, and GCP_PROJECT_ID in GitHub secrets."
          fi
